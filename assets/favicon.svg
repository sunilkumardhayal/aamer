<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Portrait of Dr. Aamer Majid Bhat">
  <defs>
    <clipPath id="portrait-circle">
      <circle cx="32" cy="32" r="29"/>
    </clipPath>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9bd8cf"/>
      <stop offset="1" stop-color="#1b7777"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="#f6f1e7"/>
  <image
    href="https://sunilkumardhayal.github.io/aamer/assets/aamer-majid-bhat.webp"
    x="3"
    y="3"
    width="58"
    height="65"
    preserveAspectRatio="xMidYMin slice"
    clip-path="url(#portrait-circle)"
  />
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="url(#frame)" stroke-width="3"/>
</svg>

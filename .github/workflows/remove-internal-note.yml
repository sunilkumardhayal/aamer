name: Remove internal profile note

# Retrigger one-time cleanup.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/remove-internal-note.yml

permissions:
  contents: write

jobs:
  clean-public-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove internal-only note
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          note = '        <p class="verified-note">Awards, grants, student supervision, memberships, and invited talks are intentionally not listed because verified details are not yet available.</p>\n'
          path.write_text(html.replace(note, '', 1), encoding='utf-8')
          PY
      - name: Commit public copy cleanup
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Remove internal note from public portfolio"
          git push

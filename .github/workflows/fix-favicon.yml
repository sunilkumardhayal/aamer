name: Fix portfolio favicon

# One-time correction: replace the SVG tab icon with the WebP portrait.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-favicon.yml

permissions:
  contents: write

jobs:
  fix-favicon:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Make WebP portrait the permanent favicon
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path("index.html")
          html = index_path.read_text(encoding="utf-8")

          old_favicon = '  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">'
          new_favicon = '''  <link rel="icon" type="image/webp" sizes="any" href="assets/aamer-majid-bhat.webp?v=20260630-5">
          <link rel="shortcut icon" type="image/webp" href="assets/aamer-majid-bhat.webp?v=20260630-5">
          <link rel="apple-touch-icon" href="assets/aamer-majid-bhat.webp?v=20260630-5">'''

          if old_favicon in html:
              html = html.replace(old_favicon, new_favicon, 1)

          html = html.replace(
              "https://sunilkumardhayal.github.io/aamer/assets/aamer-majid-bhat.jpg",
              "https://sunilkumardhayal.github.io/aamer/assets/aamer-majid-bhat.webp",
          )
          html = html.replace(
              '<img src="assets/aamer-majid-bhat.jpg" alt="Portrait of Dr. Aamer Majid Bhat"',
              '<img src="assets/aamer-majid-bhat.webp" alt="Portrait of Dr. Aamer Majid Bhat"',
          )
          html = html.replace(
              '<script src="script.js"></script>',
              '<script src="script.js?v=20260630-5"></script>',
          )

          index_path.write_text(html, encoding="utf-8")

          script_path = Path("script.js")
          script = script_path.read_text(encoding="utf-8")
          marker = 'const header = document.querySelector("[data-header]");'
          if script.startswith("const useWebPProfileImage") and marker in script:
              script = script[script.index(marker):]
              script_path.write_text(script, encoding="utf-8")
          PY

      - name: Commit corrected favicon references
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Favicon references are already correct."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html script.js
          git commit -m "Use WebP portrait as permanent favicon"
          git push

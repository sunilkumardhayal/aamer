name: Bust website asset cache

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cache-bust-assets.yml

permissions:
  contents: write

jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Version website assets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          version = "20260630-7"

          index_path = Path("index.html")
          html = index_path.read_text(encoding="utf-8")

          viewport = '  <meta name="viewport" content="width=device-width, initial-scale=1">'
          cache_meta = '''  <meta name="viewport" content="width=device-width, initial-scale=1">
          <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
          <meta http-equiv="Pragma" content="no-cache">
          <meta http-equiv="Expires" content="0">'''
          if 'http-equiv="Cache-Control"' not in html:
              html = html.replace(viewport, cache_meta, 1)

          base_styles = '  <link rel="stylesheet" href="styles.css">'
          versioned_styles = f'''  <link rel="stylesheet" href="styles.css?v={version}">
          <link rel="stylesheet" href="portfolio-upgrade.css?v={version}">'''
          if 'portfolio-upgrade.css?' not in html:
              html = html.replace(base_styles, versioned_styles, 1)
          else:
              import re
              html = re.sub(r'href="styles\.css(?:\?v=[^"]+)?"', f'href="styles.css?v={version}"', html, count=1)
              html = re.sub(r'href="portfolio-upgrade\.css(?:\?v=[^"]+)?"', f'href="portfolio-upgrade.css?v={version}"', html, count=1)

          import re
          html = re.sub(r'<script src="script\.js(?:\?v=[^"]+)?" defer></script>', f'<script src="script.js?v={version}" defer></script>', html, count=1)
          index_path.write_text(html, encoding="utf-8")

          script_path = Path("script.js")
          script = script_path.read_text(encoding="utf-8")
          script = script.replace(
              'document.querySelector(\'link[href="portfolio-upgrade.css"]\')',
              'document.querySelector(\'link[href^="portfolio-upgrade.css"]\')',
              1,
          )
          script = script.replace(
              'stylesheet.href = "portfolio-upgrade.css";',
              f'stylesheet.href = "portfolio-upgrade.css?v={version}";',
              1,
          )
          script_path.write_text(script, encoding="utf-8")
          PY

      - name: Commit cache-safe asset URLs
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Asset URLs are already versioned."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html script.js
          git commit -m "Version website assets to prevent stale refreshes"
          git push

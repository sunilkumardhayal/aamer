name: Run final static HTML cleanup

on:
  push:
    branches:
      - codex/static-professional-upgrade
    paths:
      - .github/workflows/run-finalize-static-html.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4

      - name: Run existing finalizer
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/finalize-static-professional-html.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          finalizer = textwrap.dedent(workflow[start:end])
          exec(compile(finalizer, 'finalize_static_html.py', 'exec'))
          PY

      - name: Commit final HTML cleanup
        shell: bash
        run: |
          if git diff --quiet; then
            echo "HTML is already finalized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Finalize static navigation and structured data"
          git push

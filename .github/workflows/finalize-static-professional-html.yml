name: Finalize static professional HTML

on:
  push:
    branches:
      - codex/static-professional-upgrade
    paths:
      - .github/workflows/finalize-static-professional-html.yml

permissions:
  contents: write

jobs:
  finalize-html:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4

      - name: Finalize navigation and structured data
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          nav = '''      <nav id="site-nav" class="site-nav" aria-label="Primary navigation" data-nav>
            <a href="#about">About</a>
            <a href="#research">Research</a>
            <a href="#projects">Projects</a>
            <a href="#experience">Experience</a>
            <a href="#publications">Publications</a>
            <a href="#updates">Updates</a>
            <a href="#teaching">Teaching</a>
            <a href="#contact">Contact</a>
            <a class="nav-cv" href="Aamer_CV.pdf" download>CV</a>
          </nav>'''
          html = re.sub(
              r'      <nav id="site-nav" class="site-nav" aria-label="Primary navigation" data-nav>[\s\S]*?      </nav>',
              nav,
              html,
              count=1,
          )

          # Keep the richer ProfilePage graph and remove the earlier duplicate Person block.
          first_schema = re.search(
              r'\s*<script type="application/ld\+json">\s*\{\s*"@context": "https://schema.org",\s*"@type": "Person"[\s\S]*?</script>\s*',
              html,
          )
          if first_schema:
              html = html[:first_schema.start()] + '\n' + html[first_schema.end():]

          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit final HTML cleanup
        shell: bash
        run: |
          if git diff --quiet; then
            echo "HTML is already finalized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Finalize static navigation and structured data"
          git push

name: Run static professional builder

on:
  push:
    branches:
      - codex/static-professional-upgrade
    paths:
      - .github/workflows/run-static-professional-builder.yml

permissions:
  contents: write

jobs:
  run-builder:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4

      - name: Run the existing static builder
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/build-static-professional-site.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          builder = textwrap.dedent(workflow[start:end])
          exec(compile(builder, 'static_portfolio_builder.py', 'exec'))
          PY

      - name: Commit permanent HTML structure
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Static professional structure is already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Make professional portfolio content permanent"
          git push

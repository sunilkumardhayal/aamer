name: Build static professional portfolio

on:
  push:
    branches:
      - codex/static-professional-upgrade
    paths:
      - .github/workflows/build-static-professional-site.yml

permissions:
  contents: write

jobs:
  build-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4

      - name: Convert professional content to permanent HTML
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = "20260630-9"
          path = Path("index.html")
          html = path.read_text(encoding="utf-8")

          # Permanent head metadata and versioned styles.
          if 'name="keywords"' not in html:
              html = html.replace(
                  '  <meta name="author" content="Dr. Aamer Majid Bhat">',
                  '''  <meta name="author" content="Dr. Aamer Majid Bhat">
          <meta name="keywords" content="Aamer Majid Bhat, water resources engineering, sediment transport, urban hydrology, stormwater management, sustainable drainage, NIT Srinagar">
          <meta name="robots" content="index, follow, max-image-preview:large">
          <link rel="preload" as="image" href="assets/aamer-majid-bhat.webp" type="image/webp">
          <link rel="alternate" type="application/pdf" title="Curriculum Vitae of Dr. Aamer Majid Bhat" href="Aamer_CV.pdf">''',
                  1,
              )

          html = re.sub(r'href="styles\.css(?:\?v=[^"]+)?"', f'href="styles.css?v={version}"', html, count=1)
          html = re.sub(r'href="portfolio-upgrade\.css(?:\?v=[^"]+)?"', f'href="portfolio-upgrade.css?v={version}"', html, count=1)
          if 'professional-static.css' not in html:
              html = html.replace(
                  f'<link rel="stylesheet" href="portfolio-upgrade.css?v={version}">',
                  f'''<link rel="stylesheet" href="portfolio-upgrade.css?v={version}">
          <link rel="stylesheet" href="professional-static.css?v={version}">''',
                  1,
              )

          if 'property="og:site_name"' not in html:
              html = html.replace(
                  '  <meta property="og:type" content="website">',
                  '''  <meta property="og:type" content="profile">
          <meta property="og:site_name" content="Dr. Aamer Majid Bhat Academic Portfolio">
          <meta property="og:locale" content="en_IN">''',
                  1,
              )

          if 'name="twitter:title"' not in html:
              html = html.replace(
                  '  <meta name="twitter:card" content="summary_large_image">',
                  '''  <meta name="twitter:card" content="summary_large_image">
          <meta name="twitter:title" content="Dr. Aamer Majid Bhat | Academic Portfolio">
          <meta name="twitter:description" content="Research in sediment transport, urban hydrology, sustainable drainage, and resilient stormwater management.">
          <meta name="twitter:image" content="https://sunilkumardhayal.github.io/aamer/assets/aamer-majid-bhat.webp">
          <meta name="twitter:image:alt" content="Portrait of Dr. Aamer Majid Bhat">''',
                  1,
              )

          if '"@type": "ProfilePage"' not in html:
              structured = '''
          <script type="application/ld+json">
          {
            "@context": "https://schema.org",
            "@graph": [
              {
                "@type": "ProfilePage",
                "@id": "https://sunilkumardhayal.github.io/aamer/#profile-page",
                "url": "https://sunilkumardhayal.github.io/aamer/",
                "name": "Dr. Aamer Majid Bhat | Academic Portfolio",
                "dateModified": "2026-06-30",
                "mainEntity": {"@id": "https://sunilkumardhayal.github.io/aamer/#person"}
              },
              {
                "@type": "Person",
                "@id": "https://sunilkumardhayal.github.io/aamer/#person",
                "name": "Dr. Aamer Majid Bhat",
                "jobTitle": "Assistant Professor of Civil Engineering",
                "worksFor": {"@type": "CollegeOrUniversity", "name": "National Institute of Technology Srinagar"},
                "image": "https://sunilkumardhayal.github.io/aamer/assets/aamer-majid-bhat.webp",
                "url": "https://sunilkumardhayal.github.io/aamer/",
                "sameAs": [
                  "https://scholar.google.com/citations?user=DQRelcAAAAAJ&hl=en",
                  "https://orcid.org/0000-0002-8832-2789",
                  "https://www.linkedin.com/in/aamer-majid-bhat-ph-d-921149167/"
                ],
                "knowsAbout": ["Water Resources Engineering", "Sediment Transport", "Urban Hydrology", "Stormwater Management", "Sustainable Drainage"]
              },
              {
                "@type": "ScholarlyArticle",
                "name": "Optimizing green infrastructure for urban flood mitigation using SWMM model: A case study in Kozhikode, India",
                "datePublished": "2026",
                "url": "https://doi.org/10.1061/JHYEFF.HEENG-6677"
              },
              {
                "@type": "ScholarlyArticle",
                "name": "Towards water sensitivity: A critical review of urban water management strategies",
                "datePublished": "2026",
                "url": "https://doi.org/10.1007/s11269-025-04377-2"
              },
              {
                "@type": "ScholarlyArticle",
                "name": "Movability number as the parameter of sediment incipient motion: A mathematical approach",
                "datePublished": "2023",
                "url": "https://doi.org/10.1007/s12601-023-00112-3"
              }
            ]
          }
          </script>
          '''
              html = html.replace('</head>', structured + '</head>', 1)

          # Permanent navigation links.
          nav_old = '''        <a href="#about">About</a>
          <a href="#research">Research</a>
          <a href="#experience">Experience</a>
          <a href="#publications">Publications</a>
          <a class="nav-cv" href="Aamer_CV.pdf" download>Download CV</a>'''
          nav_new = '''        <a href="#about">About</a>
          <a href="#research">Research</a>
          <a href="#projects">Projects</a>
          <a href="#experience">Experience</a>
          <a href="#publications">Publications</a>
          <a href="#updates">Updates</a>
          <a href="#teaching">Teaching</a>
          <a href="#contact">Contact</a>
          <a class="nav-cv" href="Aamer_CV.pdf" download>CV</a>'''
          html = html.replace(nav_old, nav_new, 1)

          # Hero improvements.
          if 'href="#contact">Contact me</a>' not in html:
              html = html.replace(
                  '            <a class="button button-ghost" href="Aamer_CV.pdf" download>Download CV</a>',
                  '''            <a class="button button-ghost" href="Aamer_CV.pdf" download>Download CV</a>
                  <a class="button button-ghost hero-contact-button" href="#contact">Contact me</a>''',
                  1,
              )

          html = html.replace(
              'From sediment thresholds to water-sensitive cities.',
              'From sediment incipient motion to water-sensitive cities.',
          )
          html = html.replace(
              '<img src="assets/aamer-majid-bhat.webp" alt="Portrait of Dr. Aamer Majid Bhat" width="1080" height="1216">',
              '<img src="assets/aamer-majid-bhat.webp" alt="Portrait of Dr. Aamer Majid Bhat" width="1080" height="1216" loading="eager" decoding="async" fetchpriority="high">',
              1,
          )

          if '<noscript>' not in html:
              html = html.replace(
                  '  <a class="skip-link" href="#main-content">Skip to content</a>',
                  '''  <a class="skip-link" href="#main-content">Skip to content</a>
                  <noscript><p class="container no-script-notice">This portfolio remains fully readable without JavaScript. Publication search, filtering, copy buttons, and the mobile menu require JavaScript.</p></noscript>''',
                  1,
              )

          projects = '''
          <section id="projects" class="section projects-section">
            <div class="container">
              <div class="section-heading section-heading-row reveal">
                <div>
                  <p class="eyebrow">Selected research themes</p>
                  <h2>Research translated into practical water solutions.</h2>
                </div>
                <p class="projects-intro">Three connected areas link fundamental hydraulics with resilient river and urban-water systems.</p>
              </div>

              <div class="project-grid">
                <article class="project-card reveal">
                  <span class="project-number">01</span>
                  <div class="project-visual" aria-hidden="true">
                    <svg viewBox="0 0 96 96"><path d="M10 58c14-13 27-17 40-10s25 6 36-6"/><path d="M10 70c15-8 29-10 42-4s24 5 34 1"/><circle cx="27" cy="37" r="7"/><circle cx="49" cy="29" r="5"/><circle cx="69" cy="24" r="6"/><path d="M23 18v12m-6-6 6 6 6-6"/></svg>
                  </div>
                  <h3>Sediment Incipient Motion</h3>
                  <p>Dimensionless threshold variables, movability number, grain protrusion, sediment non-uniformity, and stability of coarse material in natural streams.</p>
                  <ul class="project-tags"><li>Threshold mechanics</li><li>Movability number</li><li>Open-channel flow</li></ul>
                  <a class="project-link" href="#publications" data-project-filter="sediment">View related publications <span aria-hidden="true">→</span></a>
                </article>

                <article class="project-card reveal">
                  <span class="project-number">02</span>
                  <div class="project-visual" aria-hidden="true">
                    <svg viewBox="0 0 96 96"><path d="M12 70h72"/><path d="M18 70V46h15v24M40 70V34h18v36M65 70V23h13v47"/><path d="M10 27c14 0 14 11 28 11s14-11 28-11 14 11 20 11"/><path d="M29 81h38"/></svg>
                  </div>
                  <h3>Green Stormwater Infrastructure</h3>
                  <p>SWMM-based urban flood mitigation, sustainable drainage pathways, stormwater-control measures, and climate-aware design for Indian cities.</p>
                  <ul class="project-tags"><li>SWMM</li><li>Urban flood mitigation</li><li>Climate resilience</li></ul>
                  <a class="project-link" href="https://doi.org/10.1061/JHYEFF.HEENG-6677" target="_blank" rel="noopener">Open featured study <span aria-hidden="true">↗</span></a>
                </article>

                <article class="project-card reveal">
                  <span class="project-number">03</span>
                  <div class="project-visual" aria-hidden="true">
                    <svg viewBox="0 0 96 96"><path d="M12 67h72"/><path d="M17 61c13-18 24-18 37 0 10-14 19-14 29 0"/><path d="M20 67v10m13-10v10m13-10v10m13-10v10m13-10v10"/><path d="M17 31h62"/><path d="M23 31v15m50-15v15"/><path d="M30 22c0 5-4 9-9 9m45-9c0 5 4 9 9 9"/></svg>
                  </div>
                  <h3>Curb Inlets and Vegetated Swales</h3>
                  <p>Hydraulic performance of roadside curb inlets and swales for safer streets, sustainable drainage, and improved stormwater conveyance.</p>
                  <ul class="project-tags"><li>Curb-inlet hydraulics</li><li>Vegetated swales</li><li>Street drainage</li></ul>
                  <a class="project-link" href="https://doi.org/10.1016/j.wsee.2025.05.003" target="_blank" rel="noopener">Read the review paper <span aria-hidden="true">↗</span></a>
                </article>
              </div>
            </div>
          </section>
          '''
          if 'id="projects"' not in html:
              html = html.replace('    <section id="experience"', projects + '\n    <section id="experience"', 1)

          featured = '''
              <section class="featured-publications reveal" aria-labelledby="featured-publications-title">
                <div class="featured-publications-header">
                  <div>
                    <p class="eyebrow">Featured publications</p>
                    <h3 id="featured-publications-title">Recent and foundational work.</h3>
                  </div>
                  <p>Selected papers covering urban flood resilience, water-sensitive cities, and sediment-threshold mechanics.</p>
                </div>
                <div class="featured-grid">
                  <article class="featured-paper">
                    <div class="featured-paper-meta"><span>2026</span><span>Urban water</span></div>
                    <h4>Optimizing green infrastructure for urban flood mitigation using SWMM model</h4>
                    <p>A case study focused on green infrastructure and urban flood mitigation in Kozhikode, India.</p>
                    <a href="https://doi.org/10.1061/JHYEFF.HEENG-6677" target="_blank" rel="noopener">Open DOI <span aria-hidden="true">↗</span></a>
                  </article>
                  <article class="featured-paper">
                    <div class="featured-paper-meta"><span>2026</span><span>Review</span></div>
                    <h4>Towards water sensitivity: A critical review of urban water management strategies</h4>
                    <p>A review connecting urban-water management strategies with the wider water-sensitive-cities agenda.</p>
                    <a href="https://doi.org/10.1007/s11269-025-04377-2" target="_blank" rel="noopener">Open DOI <span aria-hidden="true">↗</span></a>
                  </article>
                  <article class="featured-paper">
                    <div class="featured-paper-meta"><span>2023</span><span>Sediment transport</span></div>
                    <h4>Movability number as the parameter of sediment incipient motion</h4>
                    <p>A mathematical treatment of movability number as a parameter for sediment incipient motion.</p>
                    <a href="https://doi.org/10.1007/s12601-023-00112-3" target="_blank" rel="noopener">Open DOI <span aria-hidden="true">↗</span></a>
                  </article>
                </div>
              </section>

              <div class="publication-toolbar reveal">
                <label class="publication-search-wrap">
                  <span class="sr-only">Search publications</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
                  <input class="publication-search" type="search" placeholder="Search by title, author, journal, year, or topic" autocomplete="off">
                </label>
                <p class="publication-results-count" aria-live="polite"></p>
              </div>
          '''
          if 'class="featured-publications' not in html:
              html = html.replace('        <div class="publication-filters reveal"', featured + '\n        <div class="publication-filters reveal"', 1)

          if 'class="publication-empty-state"' not in html:
              html = html.replace(
                  '        </div>\n      </div>\n    </section>\n\n    <section id="teaching"',
                  '        </div>\n        <p class="publication-empty-state" hidden>No publications match this search. Try a broader keyword or select another category.</p>\n      </div>\n    </section>\n\n    <section id="teaching"',
                  1,
              )

          updates = '''
          <section id="updates" class="section recent-updates-section">
            <div class="container">
              <div class="section-heading section-heading-row reveal">
                <div>
                  <p class="eyebrow">Verified research updates</p>
                  <h2>Recent additions to the publication record.</h2>
                </div>
                <p class="projects-intro">Only updates supported by the current publication information are shown here.</p>
              </div>
              <div class="updates-grid">
                <article class="update-card reveal"><span class="update-year">2026</span><div><h3>Green infrastructure and urban flood mitigation</h3><p>A SWMM-based case study in Kozhikode, India, published in the <em>Journal of Hydrologic Engineering</em>.</p><a href="https://doi.org/10.1061/JHYEFF.HEENG-6677" target="_blank" rel="noopener">Open publication ↗</a></div></article>
                <article class="update-card reveal"><span class="update-year">2026</span><div><h3>Critical review of water-sensitive urban management</h3><p>A review of urban water-management strategies published in <em>Water Resources Management</em>.</p><a href="https://doi.org/10.1007/s11269-025-04377-2" target="_blank" rel="noopener">Open publication ↗</a></div></article>
                <article class="update-card reveal"><span class="update-year">2025</span><div><h3>Sustainable drainage pathways for Indian cities</h3><p>Research on resilient urban stormwater management published in <em>Environmental Conservation</em>.</p><a href="https://doi.org/10.1017/S0376892925100222" target="_blank" rel="noopener">Open publication ↗</a></div></article>
                <article class="update-card reveal"><span class="update-year">2025</span><div><h3>Evolution of roadside curb inlets</h3><p>A review of curb-inlet development towards sustainable urban drainage.</p><a href="https://doi.org/10.1016/j.wsee.2025.05.003" target="_blank" rel="noopener">Open publication ↗</a></div></article>
              </div>
              <p class="verified-note">Awards, grants, student supervision, memberships, and invited talks are intentionally not listed because verified details are not yet available.</p>
            </div>
          </section>
          '''
          if 'id="updates"' not in html:
              html = html.replace('    <section id="teaching"', updates + '\n    <section id="teaching"', 1)

          contact = '''
          <section id="contact" class="section contact-section">
            <div class="container contact-grid">
              <div class="contact-intro reveal">
                <p class="eyebrow">Contact</p>
                <h2>Connect for research, teaching, and academic collaboration.</h2>
                <p>For research discussions, student-supervision enquiries, invited talks, peer-review activities, or academic collaboration, use the verified details provided here.</p>
                <span class="contact-availability">Academic enquiries welcome</span>
                <div class="profile-proof-strip" aria-label="Verified academic profiles">
                  <a href="https://scholar.google.com/citations?user=DQRelcAAAAAJ&hl=en" target="_blank" rel="noopener">Google Scholar ↗</a>
                  <a href="https://orcid.org/0000-0002-8832-2789" target="_blank" rel="noopener">ORCID ↗</a>
                  <a href="https://www.linkedin.com/in/aamer-majid-bhat-ph-d-921149167/" target="_blank" rel="noopener">LinkedIn ↗</a>
                </div>
              </div>
              <div class="contact-card reveal">
                <ul class="contact-list">
                  <li class="contact-copy-row"><span>Institutional email</span><div><strong>aamer_majid@nitsri.ac.in</strong><button class="copy-email-button" type="button" data-copy-email="aamer_majid@nitsri.ac.in">Copy email</button></div></li>
                  <li><a href="mailto:aamerbhat010@gmail.com"><span>Alternate email</span><strong>aamerbhat010@gmail.com</strong></a></li>
                  <li><a href="tel:+919797213888"><span>Phone</span><strong>+91 97972 13888</strong></a></li>
                  <li><a href="https://nitsri.ac.in/Department/DisplayDeptPage.aspx?ItemID=oaoke&amp;nDeptID=c&amp;page=maigs" target="_blank" rel="noopener"><span>Faculty profile</span><strong>NIT Srinagar</strong></a></li>
                </ul>
                <nav class="contact-profile-links" aria-label="Academic and professional profiles">
                  <a href="https://scholar.google.com/citations?user=DQRelcAAAAAJ&hl=en" target="_blank" rel="noopener">Google Scholar ↗</a>
                  <a href="https://orcid.org/0000-0002-8832-2789" target="_blank" rel="noopener">ORCID ↗</a>
                  <a href="https://www.linkedin.com/in/aamer-majid-bhat-ph-d-921149167/" target="_blank" rel="noopener">LinkedIn ↗</a>
                  <a href="Aamer_CV.pdf" download>Download CV ↓</a>
                </nav>
              </div>
            </div>
          </section>
          '''
          if 'id="contact"' not in html:
              html = html.replace('  </main>', contact + '\n  </main>', 1)

          floating = '''
          <aside id="floating-contact-panel" class="floating-contact-panel" aria-label="Contact Dr. Aamer Majid Bhat" hidden>
            <div class="floating-panel-header"><div><h2>Contact Me</h2><p>Choose the most convenient way to connect.</p></div><button class="floating-panel-close" type="button" data-contact-close aria-label="Close contact panel">×</button></div>
            <div class="floating-panel-links">
              <a href="mailto:aamer_majid@nitsri.ac.in"><span>Institutional email</span><span>↗</span></a>
              <a href="mailto:aamerbhat010@gmail.com"><span>Alternate email</span><span>↗</span></a>
              <a href="tel:+919797213888"><span>Call +91 97972 13888</span><span>↗</span></a>
              <a href="#contact"><span>Full contact section</span><span>↓</span></a>
            </div>
          </aside>
          <div class="floating-actions" data-floating-actions>
            <button class="floating-contact-button" type="button" data-contact-toggle aria-expanded="false" aria-controls="floating-contact-panel"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path></svg>Contact Me</button>
            <div class="floating-secondary-row"><a class="floating-cv-link" href="Aamer_CV.pdf" download aria-label="Download Aamer Majid Bhat CV"><span aria-hidden="true">↓</span> CV</a><a class="floating-top-button" href="#home" data-to-top aria-label="Back to top"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5"></path><path d="m5 12 7-7 7 7"></path></svg></a></div>
          </div>
          '''
          html = re.sub(r'\s*<a class="floating-cv-button"[\s\S]*?</a>\s*', '\n', html, count=1)
          if 'data-floating-actions' not in html:
              html = html.replace(
                  re.search(r'<script src="script\.js[^>]*></script>', html).group(0),
                  floating + '\n  ' + re.search(r'<script src="script\.js[^>]*></script>', html).group(0),
                  1,
              )

          if 'Academic portfolio · Last updated June 2026' not in html:
              html = html.replace(
                  '        <p>Assistant Professor ·',
                  '        <p>Assistant Professor ·',
                  1,
              )
              html = html.replace(
                  '      </div>\n      <p>© <span data-year></span> Aamer Majid Bhat</p>',
                  '        <p class="site-updated">Academic portfolio · Last updated June 2026</p>\n      </div>\n      <p>© <span data-year></span> Aamer Majid Bhat</p>',
                  1,
              )

          html = re.sub(r'<script src="script\.js(?:\?v=[^"]+)?" defer></script>', f'<script src="script.js?v={version}" defer></script>', html, count=1)
          path.write_text(html, encoding="utf-8")
          PY

      - name: Commit permanent HTML structure
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Static professional structure is already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Make professional portfolio content permanent"
          git push
